#
# cargo-deny configuration for fnec-rust.
# Run: cargo deny check licenses
# See: docs/dependency-policy.md

[graph]
# Analyse the full dependency graph (all features, all targets).
all-features = false
targets = []

# ── Licenses ──────────────────────────────────────────────────────────────────
[licenses]
version = 2

# Allowed SPDX expressions.  All must be compatible with GPL-3.0-only.
allow = [
    # Our own workspace crates
    "GPL-3.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "Zlib",
    "Unicode-3.0",
    "Unlicense",
    # LGPL-2.1-or-later is compatible with GPL-3.0-only when linked dynamically
    # or when the LGPL "or later" clause is exercised as LGPL-3.0.
    # r-efi is MIT OR Apache-2.0 OR LGPL-2.1-or-later — we use MIT or Apache-2.0.
    "LGPL-2.1-or-later",
]

# Exceptions for crates whose SPDX expression requires explicit acknowledgement.
# See docs/dependency-policy.md § Exception process.
[[licenses.exceptions]]
# self_cell is Apache-2.0 OR GPL-2.0-only.
# We use self_cell under the Apache-2.0 option.  GPL-2.0-only is NOT chosen.
# Rationale: multi-license crate; Apache-2.0 is GPL-3.0-compatible.
# Review date: 2026-05-02.  Re-review on any version bump to self_cell.
allow = ["Apache-2.0", "GPL-2.0-only"]
name = "self_cell"
version = "*"

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
version = 2
# Treat all unignored security advisories as errors.
# See docs/dependency-policy.md § Exception process for the review record.
ignore = [
    # quick-xml DoS advisories — SCOPED, BUILD-TIME-ONLY EXCEPTION.
    # quick-xml v0.39.x enters the graph solely as a compile-time dependency of
    # `wayland-scanner` (a proc-macro that parses the trusted, in-crate Wayland
    # protocol XML shipped with wayland-rs). It is pulled in via
    # wayland-scanner → smithay-client-toolkit → winit → iced → nec-gui, and only
    # runs on the developer/build machine over vendored, non-attacker-controlled
    # input. Neither advisory is reachable from any runtime path in fnec-rust:
    # the solver, CLI, workers, and GUI never feed untrusted data to quick-xml.
    #
    # Root fix (quick-xml >= 0.41.0) is BLOCKED UPSTREAM: the newest published
    # wayland-scanner (0.31.10) still requires `quick-xml ^0.39`; no released
    # Wayland-stack version accepts >= 0.41 yet, so a dependency bump cannot reach
    # a fixed lockfile today.
    #
    # Review date: 2026-07-02 (DC0SK, user-approved).
    # REVISIT TRIGGER: remove BOTH entries once a wayland-scanner release depends
    # on quick-xml >= 0.41.0 (then `cargo update -p quick-xml`). Tracked as a
    # Phase 8 dependency-hygiene follow-up.
    "RUSTSEC-2026-0194", # quick-xml: quadratic run time on duplicate attribute names
    "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-declaration allocation (NsReader)
]

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
# Warn (not error) on duplicate versions to keep the graph clean without
# blocking CI on transitive duplicates outside our control.
multiple-versions = "warn"

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only crates.io and local path crates are permitted.
unknown-registry = "deny"
unknown-git = "deny"
