name: Report Format Contract

on:
  pull_request:
  push:
    branches: [main]

jobs:
  report-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run report-format contract tests
        run: |
          cargo test -p nec_report
          cargo test -p nec-cli --test report_contract

  report-format:
    runs-on: ubuntu-latest
    needs: [report-contract]
    steps:
      - run: echo "Report format checks passed"
