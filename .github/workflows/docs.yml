name: Docs Checks

on:
  pull_request:

jobs:
  validate-doc-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate docs frontmatter
        run: |
          chmod +x scripts/validate-doc-frontmatter.sh
          ./scripts/validate-doc-frontmatter.sh

  check-version-bump-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump companion files
        run: |
          chmod +x scripts/check-version-bump-docs.sh
          ./scripts/check-version-bump-docs.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

  # Gate job — this is the name registered as a required status check in
  # branch protection.  It only passes when both real jobs above succeed.
  docs:
    runs-on: ubuntu-latest
    needs: [validate-doc-frontmatter, check-version-bump-docs]
    steps:
      - run: echo "All docs checks passed"
