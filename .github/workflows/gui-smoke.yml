name: GUI Smoke

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gui-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run headless GUI smoke tests
        run: cargo test -p nec-gui --test gui_smoke

  gui-smoke-gate:
    runs-on: ubuntu-latest
    needs: [gui-smoke]
    steps:
      - run: echo "GUI smoke tests passed"
