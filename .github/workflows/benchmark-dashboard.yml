name: Benchmark Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: benchmark-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: benchmark-${{ runner.os }}-

      - name: Build release binary
        run: cargo build --release -p nec-cli

      - name: Run three-mode benchmark matrix
        env:
          FNEC_BENCH_RUNS: "3"
          FNEC_BENCH_DECKS: "corpus/dipole-freesp-51seg.nec corpus/dipole-ground-51seg.nec"
          FNEC_BENCH_SOLVERS: "hallen pulse"
        run: |
          chmod +x scripts/run-benchmark-matrix.sh
          bash scripts/run-benchmark-matrix.sh benchmark-result.json

      - name: Compare against CI baseline
        id: compare
        run: |
          chmod +x scripts/benchmark-compare-json.sh
          if [[ -f benchmarks/ci-baseline.json ]]; then
            if bash scripts/benchmark-compare-json.sh \
                  benchmarks/ci-baseline.json \
                  benchmark-result.json \
                  2>&1 | tee benchmark-compare-report.txt; then
              echo "gate=passed" >> "$GITHUB_OUTPUT"
            else
              echo "gate=failed" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No ci-baseline.json found; skipping regression check."
            echo "To initialise: run scripts/run-benchmark-matrix.sh benchmarks/ci-baseline.json and commit."
            echo "gate=no-baseline" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Actions step summary
        if: always()
        run: |
          {
            echo "## Benchmark Dashboard"
            echo ""
            echo "| Field | Value |"
            echo "|:------|:------|"
            echo "| Git SHA | \`${{ github.sha }}\` |"
            echo "| Runner | \`${{ runner.os }}\` / \`ubuntu-latest\` |"
            echo "| Gate result | **${{ steps.compare.outputs.gate || 'n/a' }}** |"
            echo ""
            echo "### Summary (avg_ms per mode/solver/deck)"
            echo ""
            echo "| exec_mode | solver | deck | avg_ms | min_ms | max_ms |"
            echo "|:----------|:-------|:-----|-------:|-------:|-------:|"
            jq -r '.summary[] |
              "| \(.exec_mode) | \(.solver) | \(.deck) | \(.avg_ms) | \(.min_ms) | \(.max_ms) |"
            ' benchmark-result.json
            if [[ -f benchmark-compare-report.txt ]]; then
              echo ""
              echo "### Regression Report"
              echo ""
              echo '```'
              cat benchmark-compare-report.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-result-${{ github.sha }}
          path: benchmark-result.json
          retention-days: 90

      - name: Fail on regression
        if: steps.compare.outputs.gate == 'failed'
        run: |
          echo "Benchmark regression gate failed. See the compare report in the step summary."
          exit 1

      - name: Generate gh-pages index
        if: always()
        run: |
          mkdir -p gh-pages-output
          cat > gh-pages-output/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>fnec-rust Benchmark Dashboard</title>
<style>
body{font-family:system-ui,sans-serif;max-width:960px;margin:2em auto;padding:0 1em}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:6px 10px;text-align:right}
th{background:#f0f0f0}
td:first-child{text-align:left}
h2{margin-top:2em}
.info{color:#555}
.fail{color:#c00}
.pass{color:#080}
</style></head><body>
<h1>fnec-rust Benchmark Dashboard</h1>
<p class="info">Commit: <code>${{ github.sha }}</code> &middot; Run: <code>${{ github.run_id }}</code></p>
<p class="info">Generated at: $(date -u +%Y-%m-%dT%H:%M:%SZ)</p>
<p>Gate result: <strong class="${{ steps.compare.outputs.gate == 'failed' && 'fail' || 'pass' }}">${{ steps.compare.outputs.gate || 'n/a' }}</strong></p>
<h2>Per-mode summary</h2>
<table><thead><tr><th>exec_mode</th><th>solver</th><th>deck</th><th>avg_ms</th><th>min_ms</th><th>max_ms</th></tr></thead><tbody>
EOF
          jq -r '.summary[] | "<tr><td>\(.exec_mode)</td><td>\(.solver)</td><td>\(.deck)</td><td>\(.avg_ms)</td><td>\(.min_ms)</td><td>\(.max_ms)</td></tr>"' benchmark-result.json >> gh-pages-output/index.html
          cat >> gh-pages-output/index.html << 'EOF'
</tbody></table>
<hr><p class="info">See <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Actions run</a> for full report.</p>
</body></html>
EOF
          cp benchmark-result.json gh-pages-output/benchmark-latest.json

      - name: Deploy to gh-pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-output
          destination_dir: benchmarks
          keep_files: true

  gate-injection-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test that regression gate fires on injected regression
        run: |
          chmod +x scripts/benchmark-compare-json.sh scripts/test-benchmark-gate.sh
          bash scripts/test-benchmark-gate.sh
