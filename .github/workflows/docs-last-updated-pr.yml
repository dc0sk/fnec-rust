name: Stamp Docs last_updated in PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "docs/**"

permissions:
  contents: write
  pull-requests: read

jobs:
  stamp-docs:
    if: ${{ github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Stamp changed docs
        run: |
          chmod +x scripts/stamp-doc-last-updated.sh
          ./scripts/stamp-doc-last-updated.sh --from-git-diff "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: Commit and push stamp changes
        run: |
          if git diff --quiet; then
            echo "No stamp changes to commit."
            exit 0
          fi
          git add docs
          git commit -m "docs: stamp last_updated"
          git push
